[pytest]
# Pytest configuration for priorart

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short

# Markers for test categorization
markers =
    integration: marks tests that require network access (deselect with '-m "not integration"')
