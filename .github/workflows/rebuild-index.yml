name: Rebuild package index

on:
  schedule:
    # First of every month at 06:00 UTC — keeps the signer identity pin in
    # core/index_download.py stable (refs/heads/main).
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      top_n:
        description: Packages per ecosystem
        default: "20000"

permissions:
  id-token: write  # required for sigstore keyless signing (assemble job)
  contents: read

concurrency:
  # Serialize overlapping rebuilds; queue rather than cancel so in-flight
  # embed work on prior dispatches isn't discarded.
  group: rebuild-index
  cancel-in-progress: false

jobs:
  build-shard:
    runs-on: ubuntu-latest
    # Upper bound covering fetch retries plus CPU embed pass; individual
    # shards finish well under this in normal operation.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        ecosystem: [python, npm, crates, go, maven, nuget]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastembed usearch numpy httpx

      - name: Build ${{ matrix.ecosystem }} shard
        env:
          TOP_N: ${{ github.event.inputs.top_n || '20000' }}
        run: |
          python -m scripts.index_build.build \
            --ecosystem ${{ matrix.ecosystem }} \
            --out dist/index \
            --top-n "$TOP_N"

      - uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.ecosystem }}
          path: dist/index/
          retention-days: 7
          if-no-files-found: error

  assemble-and-publish:
    needs: build-shard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HF_REPO_ID: priorart/package-index
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install publish dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub sigstore

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: shard-*
          path: dist/index
          merge-multiple: true

      - name: Assemble manifest
        run: |
          python -m scripts.index_build.build \
            --assemble \
            --ecosystems python,npm,crates,go,maven,nuget \
            --out dist/index

      - name: Sign manifest with sigstore (keyless, GH OIDC)
        run: |
          sigstore sign \
            --bundle dist/index/manifest.sigstore.json \
            dist/index/manifest.json

      - name: Upload to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = os.environ["HF_REPO_ID"]
          api.create_repo(repo_id, repo_type="dataset", exist_ok=True, private=False)
          api.upload_folder(
              folder_path="dist/index",
              repo_id=repo_id,
              repo_type="dataset",
              commit_message=f"Rebuild index {os.environ.get('GITHUB_SHA', '')[:7]}",
          )
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: index-build-output
          path: dist/index
