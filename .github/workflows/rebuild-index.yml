name: Rebuild package index

on:
  schedule:
    # First of every month at 06:00 UTC — keeps the signer identity pin in
    # core/index_download.py stable (refs/heads/main).
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      top_n:
        description: Packages per ecosystem
        default: "20000"

permissions:
  id-token: write  # required for sigstore keyless signing
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TOP_N: ${{ github.event.inputs.top_n || '20000' }}
      HF_REPO_ID: priorart/package-index
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastembed usearch numpy huggingface_hub sigstore google-cloud-bigquery

      - name: Authenticate to Google Cloud (deps.dev BigQuery)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Build shards + manifest
        run: |
          python -m scripts.index_build.build \
            --out dist/index \
            --ecosystems python,npm,crates,go \
            --top-n "$TOP_N"

      - name: Sign manifest with sigstore (keyless, GH OIDC)
        run: |
          sigstore sign \
            --bundle dist/index/manifest.sigstore.json \
            dist/index/manifest.json

      - name: Upload to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = os.environ["HF_REPO_ID"]
          api.create_repo(repo_id, repo_type="dataset", exist_ok=True, private=False)
          api.upload_folder(
              folder_path="dist/index",
              repo_id=repo_id,
              repo_type="dataset",
              commit_message=f"Rebuild index {os.environ.get('GITHUB_SHA', '')[:7]}",
          )
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: index-build-output
          path: dist/index
