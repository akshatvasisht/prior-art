      default: "database orm"
    priority_files:
      default: ["README*", "*.pyi", "*.d.ts", "src/**/*"]
    service_note: "Database needs are often better served by managed database services (AWS RDS, PlanetScale, MongoDB Atlas, Redis Cloud) rather than self-hosted solutions."

