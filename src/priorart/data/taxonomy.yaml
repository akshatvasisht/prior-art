# Taxonomy of common package categories
# Used for mapping task descriptions to search queries

categories:
  - id: http_client
    keywords: [http, request, fetch, rest, api client, curl, web request, http get, http post]
    search_terms:
      python: "http client requests"
      javascript: "http client fetch axios"
      typescript: "http client fetch axios"
      go: "http client"
      rust: "http client reqwest"
      default: "http client"
    priority_files:
      python: ["*.pyi", "src/**/*.py", "__init__.py"]
      typescript: ["*.d.ts", "src/**/*.ts", "index.ts"]
      javascript: ["index.js", "src/**/*.js", "lib/**/*.js"]
      rust: ["src/lib.rs", "src/main.rs"]
      go: ["*.go", "pkg/**/*.go"]
      default: ["README*", "*.md"]
    service_note: null

  - id: authentication
    keywords: [auth, authentication, oauth, login, sso, identity, jwt, token, credential, signin]
    search_terms:
      python: "authentication oauth jwt"
      javascript: "authentication oauth passport"
      typescript: "authentication oauth passport"
      go: "authentication jwt oauth"
      rust: "authentication jwt oauth"
      default: "authentication"
    priority_files:
      default: ["README*", "*.pyi", "*.d.ts", "src/**/*"]
    service_note: "Authentication is a category commonly solved by managed identity services (Auth0, Okta, AWS Cognito, Firebase Auth). Consider evaluating managed alternatives alongside these open source results."

